name: hadoop-iceberg-spark-single-node

services:
  postgres:
    image: postgres:16-bookworm
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-metastore}
      POSTGRES_USER: ${POSTGRES_USER:-hive}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hive}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hive} -d ${POSTGRES_DB:-metastore}"]
      interval: 5s
      timeout: 5s
      retries: 30
    restart: unless-stopped
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  bigdata:
    build:
      context: .
      args:
        HADOOP_VERSION: "3.3.6"
        SPARK_VERSION: "3.5.4"
        HIVE_VERSION: "3.1.3"
        ICEBERG_VERSION: "1.6.1"
        POSTGRES_JDBC_VERSION: "42.7.4"
    image: ghcr.io/ruslanayvazov/hadoop-iceberg-spark-single-node:3.3.6-3.5.4
    hostname: bigdata
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-metastore}
      POSTGRES_USER: ${POSTGRES_USER:-hive}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hive}
      SPARK_DRIVER_MEMORY: ${SPARK_DRIVER_MEMORY:-2g}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:${HIVE_JDBC_PORT:-10000}:10000"
      - "127.0.0.1:${NAMENODE_UI_PORT:-9870}:9870"
      - "127.0.0.1:${SPARK_UI_PORT:-4040}:4040"
    volumes:
      - hdfs-namenode:/data/hdfs/namenode
      - hdfs-datanode:/data/hdfs/datanode
      - hdfs-secondary:/data/hdfs/namesecondary
    healthcheck:
      test: ["CMD", "/opt/bigdata/bin/healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 90s
    stop_grace_period: 60s
    restart: unless-stopped
    logging:
      options:
        max-size: "20m"
        max-file: "5"

volumes:
  postgres-data:
  hdfs-namenode:
  hdfs-datanode:
  hdfs-secondary:
