name: hadoop-iceberg-spark-cluster

x-logging: &default-logging
  options:
    max-size: "20m"
    max-file: "5"

x-bigdata-environment: &bigdata-environment
  SERVICE_ROLE: unset

services:
  postgres:
    image: postgres:16-bookworm
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-metastore}
      POSTGRES_USER: ${POSTGRES_USER:-hive}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hive}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hive} -d ${POSTGRES_DB:-metastore}"]
      interval: 5s
      timeout: 5s
      retries: 30
    restart: unless-stopped
    logging: *default-logging

  namenode:
    build:
      context: .
      args:
        HADOOP_VERSION: "3.3.6"
        SPARK_VERSION: "3.5.4"
        HIVE_VERSION: "3.1.3"
        ICEBERG_VERSION: "1.6.1"
        POSTGRES_JDBC_VERSION: "42.7.4"
    image: ghcr.io/ruslanayvazov/hadoop-iceberg-spark-cluster:3.3.6-3.5.4
    hostname: namenode
    environment:
      <<: *bigdata-environment
      SERVICE_ROLE: namenode
    ports:
      - "127.0.0.1:${NAMENODE_UI_PORT:-9870}:9870"
    volumes:
      - namenode-data:/data/hdfs/namenode
    healthcheck:
      test: ["CMD", "/opt/bigdata/bin/healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    stop_grace_period: 60s
    restart: unless-stopped
    logging: *default-logging

  secondarynamenode:
    image: ghcr.io/ruslanayvazov/hadoop-iceberg-spark-cluster:3.3.6-3.5.4
    hostname: secondarynamenode
    environment:
      <<: *bigdata-environment
      SERVICE_ROLE: secondarynamenode
    depends_on:
      namenode:
        condition: service_healthy
    volumes:
      - secondarynamenode-data:/data/hdfs/namesecondary
    healthcheck:
      test: ["CMD", "/opt/bigdata/bin/healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    stop_grace_period: 30s
    restart: unless-stopped
    logging: *default-logging

  worker1:
    image: ghcr.io/ruslanayvazov/hadoop-iceberg-spark-cluster:3.3.6-3.5.4
    hostname: worker1
    environment:
      <<: *bigdata-environment
      SERVICE_ROLE: worker
    depends_on:
      namenode:
        condition: service_healthy
    volumes:
      - worker1-data:/data
    healthcheck:
      test: ["CMD", "/opt/bigdata/bin/healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 45s
    stop_grace_period: 60s
    restart: unless-stopped
    logging: *default-logging

  worker2:
    image: ghcr.io/ruslanayvazov/hadoop-iceberg-spark-cluster:3.3.6-3.5.4
    hostname: worker2
    environment:
      <<: *bigdata-environment
      SERVICE_ROLE: worker
    depends_on:
      namenode:
        condition: service_healthy
    volumes:
      - worker2-data:/data
    healthcheck:
      test: ["CMD", "/opt/bigdata/bin/healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 45s
    stop_grace_period: 60s
    restart: unless-stopped
    logging: *default-logging

  worker3:
    image: ghcr.io/ruslanayvazov/hadoop-iceberg-spark-cluster:3.3.6-3.5.4
    hostname: worker3
    environment:
      <<: *bigdata-environment
      SERVICE_ROLE: worker
    depends_on:
      namenode:
        condition: service_healthy
    volumes:
      - worker3-data:/data
    healthcheck:
      test: ["CMD", "/opt/bigdata/bin/healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 45s
    stop_grace_period: 60s
    restart: unless-stopped
    logging: *default-logging

  resourcemanager:
    image: ghcr.io/ruslanayvazov/hadoop-iceberg-spark-cluster:3.3.6-3.5.4
    hostname: resourcemanager
    environment:
      <<: *bigdata-environment
      SERVICE_ROLE: resourcemanager
    depends_on:
      namenode:
        condition: service_healthy
    ports:
      - "127.0.0.1:${YARN_UI_PORT:-8088}:8088"
    healthcheck:
      test: ["CMD", "/opt/bigdata/bin/healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    stop_grace_period: 30s
    restart: unless-stopped
    logging: *default-logging

  metastore:
    image: ghcr.io/ruslanayvazov/hadoop-iceberg-spark-cluster:3.3.6-3.5.4
    hostname: metastore
    environment:
      <<: *bigdata-environment
      SERVICE_ROLE: metastore
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-metastore}
      POSTGRES_USER: ${POSTGRES_USER:-hive}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hive}
    depends_on:
      postgres:
        condition: service_healthy
      namenode:
        condition: service_healthy
      worker1:
        condition: service_healthy
      worker2:
        condition: service_healthy
      worker3:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/opt/bigdata/bin/healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    stop_grace_period: 30s
    restart: unless-stopped
    logging: *default-logging

  thriftserver:
    image: ghcr.io/ruslanayvazov/hadoop-iceberg-spark-cluster:3.3.6-3.5.4
    hostname: thriftserver
    environment:
      <<: *bigdata-environment
      SERVICE_ROLE: thriftserver
      SPARK_DRIVER_MEMORY: ${SPARK_DRIVER_MEMORY:-1g}
      SPARK_EXECUTOR_INSTANCES: ${SPARK_EXECUTOR_INSTANCES:-3}
      SPARK_EXECUTOR_CORES: ${SPARK_EXECUTOR_CORES:-1}
      SPARK_EXECUTOR_MEMORY: ${SPARK_EXECUTOR_MEMORY:-512m}
    depends_on:
      resourcemanager:
        condition: service_healthy
      metastore:
        condition: service_healthy
    ports:
      - "127.0.0.1:${HIVE_JDBC_PORT:-10000}:10000"
      - "127.0.0.1:${SPARK_UI_PORT:-4040}:4040"
    healthcheck:
      test: ["CMD", "/opt/bigdata/bin/healthcheck.sh"]
      interval: 30s
      timeout: 5s
      retries: 40
      start_period: 180s
    stop_grace_period: 90s
    restart: unless-stopped
    logging: *default-logging

  historyserver:
    image: ghcr.io/ruslanayvazov/hadoop-iceberg-spark-cluster:3.3.6-3.5.4
    hostname: historyserver
    environment:
      <<: *bigdata-environment
      SERVICE_ROLE: historyserver
    depends_on:
      metastore:
        condition: service_healthy
    ports:
      - "127.0.0.1:${SPARK_HISTORY_UI_PORT:-18080}:18080"
    healthcheck:
      test: ["CMD", "/opt/bigdata/bin/healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    stop_grace_period: 30s
    restart: unless-stopped
    logging: *default-logging

volumes:
  postgres-data:
  namenode-data:
  secondarynamenode-data:
  worker1-data:
  worker2-data:
  worker3-data:
