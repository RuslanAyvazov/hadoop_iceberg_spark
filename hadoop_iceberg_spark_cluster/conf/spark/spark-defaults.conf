spark.master                           yarn
spark.submit.deployMode               client

spark.driver.memory                    1g
spark.executor.instances               3
spark.executor.cores                   1
spark.executor.memory                  512m
spark.executor.memoryOverhead          384m
spark.dynamicAllocation.enabled        false
spark.yarn.am.memory                    512m
spark.yarn.am.memoryOverhead            384m
spark.yarn.am.cores                     1
spark.yarn.maxAppAttempts               1
spark.yarn.populateHadoopClasspath      true
spark.yarn.jars                         local:/opt/spark/jars/*

spark.sql.catalogImplementation        hive
spark.sql.extensions                   org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions
spark.sql.catalog.iceberg              org.apache.iceberg.spark.SparkCatalog
spark.sql.catalog.iceberg.type         hive
spark.sql.catalog.iceberg.uri          thrift://metastore:9083
spark.sql.catalog.iceberg.warehouse    hdfs://namenode:9820/warehouse
spark.sql.catalog.spark_catalog        org.apache.iceberg.spark.SparkSessionCatalog
spark.sql.catalog.spark_catalog.type   hive
spark.sql.warehouse.dir                hdfs://namenode:9820/warehouse
spark.sql.adaptive.enabled             true
spark.sql.shuffle.partitions           12

spark.hadoop.fs.defaultFS              hdfs://namenode:9820
spark.hadoop.hive.metastore.uris       thrift://metastore:9083

spark.jars                             /opt/spark/extra-jars/iceberg-spark-runtime-3.5_2.12-1.6.1.jar,/opt/spark/extra-jars/iceberg-hive-runtime-1.6.1.jar
spark.driver.extraClassPath            /opt/spark/extra-jars/iceberg-spark-runtime-3.5_2.12-1.6.1.jar:/opt/spark/extra-jars/iceberg-hive-runtime-1.6.1.jar
spark.executor.extraClassPath          /opt/spark/extra-jars/iceberg-spark-runtime-3.5_2.12-1.6.1.jar:/opt/spark/extra-jars/iceberg-hive-runtime-1.6.1.jar

spark.driver.bindAddress               0.0.0.0
spark.ui.port                          4040
spark.eventLog.enabled                 true
spark.eventLog.dir                     hdfs://namenode:9820/spark-history
spark.eventLog.compress                true
spark.history.fs.logDirectory          hdfs://namenode:9820/spark-history
spark.history.ui.port                  18080
spark.history.fs.cleaner.enabled       true
spark.history.fs.cleaner.interval      1h
spark.history.fs.cleaner.maxAge        1d

