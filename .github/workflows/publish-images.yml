name: Build and publish Docker images

on:
  push:
    branches:
      - main
    paths:
      - hadoop_iceberg_spark_cluster/**
      - hadoop_iceberg_spark_single_node/**
      - .github/workflows/publish-images.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-images-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    name: ${{ matrix.title }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - title: Single-node image
            context: hadoop_iceberg_spark_single_node
            image: hadoop-iceberg-spark-single-node
          - title: Cluster image
            context: hadoop_iceberg_spark_cluster
            image: hadoop-iceberg-spark-cluster

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: metadata
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/ruslanayvazov/${{ matrix.image }}
          tags: |
            type=raw,value=3.3.6-3.5.4
            type=raw,value=latest
            type=sha,prefix=sha-
          labels: |
            org.opencontainers.image.source=https://github.com/RuslanAyvazov/hadoop_iceberg_spark
            org.opencontainers.image.description=Hadoop 3.3.6, Spark 3.5.4, Hive 3.1.3 and Iceberg 1.6.1

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.context }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=min,scope=${{ matrix.image }}
